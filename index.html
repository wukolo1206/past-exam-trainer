<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學力檢測考古題練習</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); min-height: 100vh; }
    .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.10); }
    .tab-btn { transition: all 0.15s; }
    .tab-btn.active { background: #2563eb; color: white; font-weight: 800; }
    .grade-btn { transition: all 0.15s; }
    .grade-btn.active { background: #1d4ed8; color: white; font-weight: 800; }
    .count-btn { transition: all 0.15s; }
    .count-btn.active { border-color: #2563eb; background: #eff6ff; color: #1e40af; font-weight: 800; }
    .hidden { display: none !important; }
    select { cursor: pointer; }
    option:disabled { color: #9ca3af; }
  </style>
</head>
<body class="antialiased flex items-start justify-center p-4 md:p-8">

  <div class="w-full max-w-lg">
    <!-- Header -->
    <div class="text-center mb-6">
      <div class="text-5xl mb-2">📐</div>
      <h1 class="text-2xl font-black text-blue-900">學力檢測考古題練習</h1>
      <p class="text-sm text-gray-500 mt-1">選好條件，開始練習！</p>
    </div>

    <div class="glass rounded-3xl overflow-hidden">
      <div class="bg-blue-600 px-6 py-4 text-white">
        <h2 class="font-black text-lg">出題設定</h2>
      </div>

      <div class="p-6 space-y-5">

        <!-- 班級 -->
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">班級</label>
          <select id="sel-class" onchange="onClassChange()"
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 outline-none text-lg font-bold">
            <option value="">-- 請選擇班級 --</option>
            <option value="301">301 班</option>
            <option value="302">302 班</option>
            <option value="303">303 班</option>
            <option value="304">304 班</option>
          </select>
        </div>

        <!-- 姓名 -->
        <div id="name-area">
          <label class="block text-sm font-bold text-gray-700 mb-1">姓名</label>
          <select id="sel-name"
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 outline-none text-lg font-bold">
            <option value="">-- 請先選擇班級 --</option>
          </select>
        </div>

        <!-- 年級 -->
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">年級</label>
          <div class="flex gap-2">
            <button onclick="setGrade(3)" class="grade-btn flex-1 py-2.5 rounded-xl border-2 border-gray-200 bg-white text-gray-600 font-bold text-sm transition">三年級</button>
            <button onclick="setGrade(4)" class="grade-btn flex-1 py-2.5 rounded-xl border-2 border-gray-200 bg-white text-gray-600 font-bold text-sm transition">四年級</button>
            <button onclick="setGrade(5)" class="grade-btn flex-1 py-2.5 rounded-xl border-2 border-gray-200 bg-white text-gray-600 font-bold text-sm transition">五年級</button>
            <button onclick="setGrade(6)" class="grade-btn flex-1 py-2.5 rounded-xl border-2 border-gray-200 bg-white text-gray-600 font-bold text-sm transition">六年級</button>
          </div>
        </div>

        <!-- 出題方式 -->
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">出題方式</label>
          <div class="flex gap-1 bg-gray-100 rounded-xl p-1">
            <button onclick="setMode('year')"  class="tab-btn flex-1 py-2 rounded-lg text-sm font-bold text-gray-600 transition">按年份</button>
            <button onclick="setMode('unit')"  class="tab-btn flex-1 py-2 rounded-lg text-sm font-bold text-gray-600 transition">按單元</button>
            <button onclick="setMode('indicator')" class="tab-btn flex-1 py-2 rounded-lg text-sm font-bold text-gray-600 transition">按指標</button>
          </div>

          <!-- 年份子選單 -->
          <div id="panel-year" class="hidden mt-3">
            <select id="sel-year" onchange="updatePoolHint()"
              class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 outline-none font-bold">
              <option value="">-- 選擇年份 --</option>
              <option value="114">114 學年</option>
              <option value="113">113 學年</option>
              <option value="112">112 學年</option>
              <option value="111">111 學年</option>
              <option value="110">110 學年</option>
              <option value="109">109 學年</option>
              <option value="108">108 學年</option>
              <option value="106">106 學年</option>
            </select>
          </div>

          <!-- 單元子選單 -->
          <div id="panel-unit" class="hidden mt-3">
            <select id="sel-unit" onchange="updatePoolHint()"
              class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 outline-none font-bold">
              <option value="">-- 選擇單元 --</option>
            </select>
          </div>

          <!-- 指標子選單 -->
          <div id="panel-indicator" class="hidden mt-3">
            <select id="sel-indicator" onchange="updatePoolHint()"
              class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 outline-none font-bold">
              <option value="">-- 選擇指標 --</option>
            </select>
          </div>
        </div>

        <!-- 題數 -->
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">
            題數 <span id="pool-hint" class="text-gray-400 font-normal text-xs ml-1"></span>
          </label>
          <div class="flex gap-2 flex-wrap">
            <button onclick="setCount(5,this)"  class="count-btn px-4 py-2.5 rounded-xl border-2 border-gray-200 bg-white text-gray-600 font-bold text-sm transition">5 題</button>
            <button onclick="setCount(10,this)" class="count-btn active px-4 py-2.5 rounded-xl border-2 border-blue-500 bg-blue-50 text-blue-800 font-black text-sm transition">10 題</button>
            <button onclick="setCount(15,this)" class="count-btn px-4 py-2.5 rounded-xl border-2 border-gray-200 bg-white text-gray-600 font-bold text-sm transition">15 題</button>
            <button onclick="setCount(20,this)" class="count-btn px-4 py-2.5 rounded-xl border-2 border-gray-200 bg-white text-gray-600 font-bold text-sm transition">20 題</button>
            <button onclick="setCount(0,this)"  class="count-btn px-4 py-2.5 rounded-xl border-2 border-gray-200 bg-white text-gray-600 font-bold text-sm transition">全部</button>
          </div>
        </div>

        <p id="err-msg" class="text-red-500 text-sm hidden"></p>

        <button onclick="startQuiz()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black text-xl py-4 rounded-2xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all">
          🚀 開始練習
        </button>

        <div class="flex gap-2 pt-1 border-t border-gray-100">
          <a href="teacher.html" class="flex-1 text-center text-sm text-blue-500 hover:text-blue-700 font-bold py-1 transition">👨‍🏫 教師 Dashboard</a>
          <a href="record.html" class="flex-1 text-center text-sm text-indigo-500 hover:text-indigo-700 font-bold py-1 transition">📖 我的錯題查詢</a>
        </div>
      </div>
    </div>
  </div>

<script>
const GAS_URL = 'YOUR_GAS_WEB_APP_URL';

let questions = [];
let unitsMap = {};
let selectedGrade = null;
let selectedMode = null;
let selectedCount = 10;

async function init() {
  const [qRes, uRes] = await Promise.all([
    fetch('data/questions.json'),
    fetch('data/units_map.json')
  ]);
  questions = await qRes.json();
  unitsMap = await uRes.json();
}
init();

async function onClassChange() {
  const cls = document.getElementById('sel-class').value;
  const nameArea = document.getElementById('name-area');
  const sel = document.getElementById('sel-name');

  // Remove any previously added text input
  const existingInput = document.getElementById('input-name');
  if (existingInput) existingInput.remove();

  if (!cls) {
    sel.innerHTML = '<option value="">-- 請先選擇班級 --</option>';
    sel.classList.remove('hidden');
    return;
  }

  sel.innerHTML = '<option value="">載入中...</option>';
  try {
    const res = await fetch(GAS_URL + '?action=students&class=' + cls);
    const data = await res.json();
    if (data.students && data.students.length > 0) {
      sel.innerHTML = '<option value="">-- 請選擇姓名 --</option>' +
        data.students.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
      sel.classList.remove('hidden');
    } else {
      sel.classList.add('hidden');
      const input = document.createElement('input');
      input.type = 'text';
      input.id = 'input-name';
      input.placeholder = '輸入姓名';
      input.className = 'w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 outline-none text-lg font-bold';
      nameArea.appendChild(input);
    }
  } catch(e) {
    sel.classList.add('hidden');
    const input = document.createElement('input');
    input.type = 'text';
    input.id = 'input-name';
    input.placeholder = '輸入姓名';
    input.className = 'w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 outline-none text-lg font-bold';
    nameArea.appendChild(input);
  }
}

function setGrade(g) {
  selectedGrade = g;
  document.querySelectorAll('.grade-btn').forEach((b, i) => {
    b.classList.toggle('active', i === g - 3);
  });
  buildUnitSelect(g);
  buildIndicatorSelect(g);
  updatePoolHint();
}

function buildUnitSelect(grade) {
  const sel = document.getElementById('sel-unit');
  const units = unitsMap[String(grade)] || [];
  sel.innerHTML = '<option value="">-- 選擇單元 --</option>' +
    units.map(u => `<option value="${u.id}">${u.title}</option>`).join('');
}

function buildIndicatorSelect(grade) {
  const sel = document.getElementById('sel-indicator');
  const units = unitsMap[String(grade)] || [];
  const seen = new Set();
  units.forEach(u => u.indicators.forEach(ind => seen.add(ind)));
  const gradeQs = questions.filter(q => q.grade === grade);
  const validInds = [...seen].filter(ind => gradeQs.some(q => (q.indicators || []).includes(ind)));
  sel.innerHTML = '<option value="">-- 選擇指標 --</option>' +
    validInds.map(ind => `<option value="${ind}">${ind}</option>`).join('');
}

function setMode(mode) {
  selectedMode = mode;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  ['year', 'unit', 'indicator'].forEach(m => {
    document.getElementById('panel-' + m).classList.add('hidden');
  });
  document.getElementById('panel-' + mode).classList.remove('hidden');
  updatePoolHint();
}

function setCount(n, btn) {
  selectedCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function getPoolQuestions() {
  if (!selectedGrade || !selectedMode) return [];
  let pool = questions.filter(q => q.grade === selectedGrade);

  if (selectedMode === 'year') {
    const year = Number(document.getElementById('sel-year').value);
    if (!year) return [];
    pool = pool.filter(q => q.year === year);
  } else if (selectedMode === 'unit') {
    const unitId = document.getElementById('sel-unit').value;
    if (!unitId) return [];
    const unit = (unitsMap[String(selectedGrade)] || []).find(u => u.id === unitId);
    if (!unit) return [];
    const inds = new Set(unit.indicators);
    pool = pool.filter(q => (q.indicators || []).some(ind => inds.has(ind)));
  } else if (selectedMode === 'indicator') {
    const ind = document.getElementById('sel-indicator').value;
    if (!ind) return [];
    pool = pool.filter(q => (q.indicators || []).includes(ind));
  }
  return pool;
}

function updatePoolHint() {
  const pool = getPoolQuestions();
  document.getElementById('pool-hint').textContent =
    pool.length > 0 ? `（本池共 ${pool.length} 題）` : '';
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showError(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function getName() {
  const inputEl = document.getElementById('input-name');
  if (inputEl) return inputEl.value.trim();
  return document.getElementById('sel-name').value;
}

function getConditionLabel() {
  if (selectedMode === 'year') {
    const sel = document.getElementById('sel-year');
    return sel.value ? sel.value + '學年' : '';
  }
  if (selectedMode === 'unit') {
    const sel = document.getElementById('sel-unit');
    return sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text : '';
  }
  if (selectedMode === 'indicator') {
    return document.getElementById('sel-indicator').value;
  }
  return '';
}

function startQuiz() {
  document.getElementById('err-msg').classList.add('hidden');

  const cls = document.getElementById('sel-class').value;
  const name = getName();

  if (!cls) { showError('請選擇班級'); return; }
  if (!name) { showError('請選擇或輸入姓名'); return; }
  if (!selectedGrade) { showError('請選擇年級'); return; }
  if (!selectedMode) { showError('請選擇出題方式'); return; }

  let pool = getPoolQuestions();
  if (pool.length === 0) { showError('此條件下沒有題目，請換個選擇'); return; }

  pool = shuffle(pool);
  const finalCount = selectedCount === 0 ? pool.length : Math.min(selectedCount, pool.length);
  const selected = pool.slice(0, finalCount);

  const config = {
    name, class: cls, grade: selectedGrade,
    mode: selectedMode,
    condition: getConditionLabel(),
    questions: selected
  };
  sessionStorage.setItem('quizConfig', JSON.stringify(config));
  window.location.href = 'quiz.html';
}
</script>
</body>
</html>
