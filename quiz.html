<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考古題作答</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4ff; min-height: 100vh; }
    .hidden { display: none !important; }

    .opt-btn {
      transition: all 0.12s;
      cursor: pointer;
      border: 2px solid #e5e7eb;
      background: white;
      text-align: left;
    }
    .opt-btn:hover:not(.answered) {
      border-color: #3b82f6;
      background: #eff6ff;
      transform: translateX(3px);
    }
    .opt-correct { background: #dcfce7 !important; border-color: #22c55e !important; }
    .opt-wrong   { background: #fee2e2 !important; border-color: #ef4444 !important; }

    @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .slide-in { animation: slideIn 0.2s ease-out; }
  </style>
</head>
<body class="flex flex-col items-center px-4 py-5">

  <div class="w-full max-w-lg">

    <!-- 頂部：進度 -->
    <div class="mb-4">
      <div class="flex justify-between items-center mb-2">
        <span id="progress-text" class="text-sm font-black text-gray-500"></span>
        <span id="ind-badge" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-black max-w-[180px] truncate"></span>
      </div>
      <div class="w-full bg-gray-200 h-2 rounded-full">
        <div id="progress-bar" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width:0%"></div>
      </div>
    </div>

    <!-- 題目卡片 -->
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">

      <div id="question-area" class="p-5 slide-in">
        <!-- 圖片 -->
        <div id="img-area" class="hidden mb-4">
          <img id="q-img" src="" alt="題目圖片" class="w-full rounded-xl border border-gray-100 block cursor-zoom-in" onclick="toggleZoom(this)">
        </div>

        <!-- 題幹 -->
        <p id="q-stem" class="text-base font-bold text-gray-800 mb-5 leading-relaxed"></p>

        <!-- 選項 -->
        <div id="q-options" class="space-y-2.5"></div>

        <!-- 回饋 -->
        <div id="feedback" class="hidden mt-4 py-3 px-4 rounded-xl text-sm font-bold text-center"></div>
      </div>

      <!-- 導航 -->
      <div class="flex gap-2 px-5 pb-5">
        <button onclick="goPrev()" id="btn-prev"
          class="px-4 py-3 rounded-xl border-2 border-gray-200 text-gray-500 font-bold text-sm transition hover:border-blue-300 hover:text-blue-600">
          ← 上一題
        </button>
        <button onclick="goNext()" id="btn-next"
          class="flex-1 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-black text-sm transition">
          下一題 →
        </button>
        <button onclick="submitQuiz()" id="btn-submit"
          class="hidden flex-1 py-3 rounded-xl bg-amber-500 hover:bg-amber-600 text-white font-black text-sm transition">
          提交成績 ✓
        </button>
      </div>
    </div>

    <div class="text-center mt-4">
      <a href="index.html" class="text-sm text-gray-400 hover:text-gray-600 font-bold transition">↩ 返回首頁</a>
    </div>
  </div>

<script>
const OPT_SYMBOLS = ['①', '②', '③', '④'];

function toggleZoom(img) {
  if (img.classList.contains('zoomed')) {
    img.classList.remove('zoomed');
    img.style.cssText = '';
    img.style.cursor = 'zoom-in';
  } else {
    img.classList.add('zoomed');
    img.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:96vw;max-width:700px;z-index:999;border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.6);cursor:zoom-out';
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const z = document.querySelector('.zoomed');
    if (z) toggleZoom(z);
  }
});

let config = null;
let current = 0;
let answers = [];

function init() {
  const raw = sessionStorage.getItem('quizConfig');
  if (!raw) { window.location.href = 'index.html'; return; }
  try { config = JSON.parse(raw); } catch(e) { window.location.href = 'index.html'; return; }
  answers = config.questions.map(() => ({ chosen: null, is_correct: null }));
  renderQuestion(0);
}

function renderQuestion(idx) {
  current = idx;
  const q = config.questions[idx];
  const total = config.questions.length;

  document.getElementById('progress-text').textContent = '第 ' + (idx + 1) + ' / ' + total + ' 題';
  document.getElementById('progress-bar').style.width = ((idx + 1) / total * 100) + '%';
  document.getElementById('ind-badge').textContent = (q.indicators || [''])[0] || '';

  if (q.has_image) {
    document.getElementById('q-img').src = 'img/' + q.year + '_' + q.grade + '_q' + q.q_no + '.png';
    document.getElementById('img-area').classList.remove('hidden');
  } else {
    document.getElementById('img-area').classList.add('hidden');
  }

  document.getElementById('q-stem').textContent = q.stem;
  document.getElementById('q-stem').style.whiteSpace = 'pre-wrap';

  const optContainer = document.getElementById('q-options');
  optContainer.innerHTML = '';
  const rawKeys = Object.keys(q.options).sort((a, b) => Number(a) - Number(b));
  // 含圖題 options 為空時，補 ①②③④ 空白按鈕（選項文字在圖片中）
  const optKeys = rawKeys.length > 0 ? rawKeys : ['1', '2', '3', '4'];
  const isImgOnly = rawKeys.length === 0;
  if (isImgOnly) {
    const hint = document.createElement('p');
    hint.className = 'text-xs text-gray-400 font-bold mb-2';
    hint.textContent = '（選項請見上方圖片）';
    optContainer.appendChild(hint);
  }
  optKeys.forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn w-full px-4 py-3.5 rounded-xl font-bold text-gray-700 text-sm flex items-center gap-3';
    btn.dataset.key = key;
    const labelText = isImgOnly
      ? '<span class="text-blue-500 font-black text-lg flex-shrink-0">' + OPT_SYMBOLS[Number(key) - 1] + '</span>'
      : '<span class="text-blue-500 font-black text-base flex-shrink-0">' + OPT_SYMBOLS[Number(key) - 1] + '</span>' +
        '<span>' + q.options[key] + '</span>';
    btn.innerHTML = labelText;
    if (answers[idx].chosen !== null) {
      btn.classList.add('answered');
      applyStyle(btn, Number(key), q.answer, answers[idx].chosen);
    }
    btn.addEventListener('click', () => onAnswer(idx, Number(key)));
    optContainer.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  if (answers[idx].chosen !== null) {
    fb.classList.remove('hidden');
    if (answers[idx].is_correct) {
      fb.textContent = '✅ 答對了！';
      fb.className = 'mt-4 py-3 px-4 rounded-xl text-sm font-bold text-center bg-green-50 text-green-700';
    } else {
      fb.textContent = '❌ 答錯了，正確答案是 ' + OPT_SYMBOLS[q.answer - 1];
      fb.className = 'mt-4 py-3 px-4 rounded-xl text-sm font-bold text-center bg-red-50 text-red-700';
    }
  } else {
    fb.classList.add('hidden');
  }

  document.getElementById('btn-prev').style.visibility = idx === 0 ? 'hidden' : 'visible';
  const isLast = idx === total - 1;
  document.getElementById('btn-next').classList.toggle('hidden', isLast);
  document.getElementById('btn-submit').classList.toggle('hidden', !isLast);

  const area = document.getElementById('question-area');
  area.classList.remove('slide-in');
  void area.offsetWidth;
  area.classList.add('slide-in');
}

function applyStyle(btn, key, correctAnswer, chosenAnswer) {
  if (key === correctAnswer) btn.classList.add('opt-correct');
  else if (key === chosenAnswer) btn.classList.add('opt-wrong');
}

function onAnswer(idx, chosenKey) {
  if (answers[idx].chosen !== null) return;
  const q = config.questions[idx];
  answers[idx].chosen = chosenKey;
  answers[idx].is_correct = chosenKey === q.answer;

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.classList.add('answered');
    applyStyle(btn, Number(btn.dataset.key), q.answer, chosenKey);
  });

  const fb = document.getElementById('feedback');
  if (answers[idx].is_correct) {
    fb.textContent = '✅ 答對了！';
    fb.className = 'mt-4 py-3 px-4 rounded-xl text-sm font-bold text-center bg-green-50 text-green-700';
  } else {
    fb.textContent = '❌ 答錯了，正確答案是 ' + OPT_SYMBOLS[q.answer - 1];
    fb.className = 'mt-4 py-3 px-4 rounded-xl text-sm font-bold text-center bg-red-50 text-red-700';
  }
  fb.classList.remove('hidden');
}

function goNext() { if (current < config.questions.length - 1) renderQuestion(current + 1); }
function goPrev() { if (current > 0) renderQuestion(current - 1); }

function submitQuiz() {
  const unanswered = answers.filter(a => a.chosen === null).length;
  if (unanswered > 0 && !confirm('還有 ' + unanswered + ' 題未作答，確定要提交？')) return;
  const score = answers.filter(a => a.is_correct === true).length;
  const result = {
    name: config.name,
    class: config.class,
    grade: config.grade,
    mode: config.mode,
    condition: config.condition,
    total: config.questions.length,
    score: score,
    timestamp: new Date().toISOString(),
    answers: config.questions.map((q, i) => ({
      year: q.year,
      q_no: q.q_no,
      indicator: (q.indicators || [''])[0] || '',
      chosen: answers[i].chosen,
      correct: q.answer,
      is_correct: answers[i].is_correct === true
    }))
  };
  sessionStorage.setItem('quizResult', JSON.stringify(result));
  window.location.href = 'result.html';
}

init();
</script>
</body>
</html>
